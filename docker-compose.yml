version: "3.9"

services:

  backend:
    build: ./backend
    container_name: codecontest_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    container_name: codecontest_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: codecontest
    ports:
      - "3307:3306"

  redis:
    image: redis:7
    container_name: codecontest_redis
    ports:
      - "6379:6379"